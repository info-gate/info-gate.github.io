<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nailoop — 내 네일, 보여주고 싶어.</title>
  <meta name="description" content="내 네일, 보여주고 싶어.. Show off your nails.">
  <link rel="canonical" href="https://info-gate.github.io/nailoop/">
  <meta property="og:title" content="Nailoop — Show off your nails.">
  <meta property="og:description" content="내 네일, 보여주고 싶어.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://info-gate.github.io/nailoop/">
  <meta name="theme-color" content="#f472b6">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      color: #1A1D22;
      background: #fafafa;
      line-height: 1.6;
      -webkit-tap-highlight-color: transparent;
    }
    body { min-height: 100vh; }

    .hero {
      background: linear-gradient(135deg, #f472b6 0%, #d65498 100%);
      color: #fff;
      padding: 56px 24px 80px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: ""; position: absolute; right: -120px; top: -80px;
      width: 380px; height: 380px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .hero::after {
      content: ""; position: absolute; right: 80px; bottom: -60px;
      width: 180px; height: 180px; border-radius: 50%;
      background: rgba(239,159,39,0.2);
    }
    .hero-inner { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }
    .brand { font-size: 14px; letter-spacing: 1px; opacity: 0.9; margin-bottom: 10px; font-weight: 700; }
    h1 { font-size: 38px; font-weight: 800; line-height: 1.15; margin-bottom: 16px; letter-spacing: -0.5px; }
    h1 span { color: #FBD78D; }
    .hero p { font-size: 17px; line-height: 1.55; opacity: 0.93; margin-bottom: 32px; }

    .cta-row { display: flex; flex-direction: column; gap: 10px; }
    @media (min-width: 520px) { .cta-row { flex-direction: row; } }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 22px; border-radius: 12px;
      font-size: 15px; font-weight: 700; text-decoration: none;
      transition: transform 0.1s ease;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #fff; color: #f472b6; }
    .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25); }

    .section { padding: 56px 24px; }
    .section-inner { max-width: 720px; margin: 0 auto; }
    .section h2 { font-size: 22px; font-weight: 800; margin-bottom: 28px; color: #1A1D22; }

    .coming-soon {
      text-align: center; padding: 80px 24px;
      background: #fff; border-top: 1px solid #F1F3F6; border-bottom: 1px solid #F1F3F6;
    }
    .coming-soon h3 {
      font-size: 24px; font-weight: 800; margin-bottom: 12px; color: #f472b6;
    }
    .coming-soon p { color: #4B5159; font-size: 15px; max-width: 460px; margin: 0 auto; }

    footer {
      padding: 24px; text-align: center; font-size: 12px; color: #7A828C;
      background: #fafafa;
    }
    footer a { color: #7A828C; text-decoration: underline; margin: 0 6px; }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-inner">
      <div class="brand">nailoop</div>
      <h1>내 네일, 보여주고 싶어.</h1>
      <p>Show off your nails.</p>
      <div class="cta-row">
        <a href="#more" class="btn btn-primary">📱 더 알아보기</a>
      </div>
    </div>
  </section>

  <section class="coming-soon" id="more">
    <h3>곧 만나요</h3>
    <p>Nailoop의 자세한 소개와 사용법이 이 페이지에 곧 올라옵니다.<br>
       출시 소식이 궁금하시면 <a href="mailto:parkbongjun23@gmail.com" style="color:#f472b6;">이메일</a>로 연락주세요.</p>
  </section>

  <footer>
    © 2026 wowpia · Nailoop
    <br>
    
    <a href="mailto:parkbongjun23@gmail.com">문의</a>
  </footer>
</body>
</html>
