<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>info-gate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
    .app-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      border-radius: 14px;
      background: linear-gradient(135deg, #FF6B81, #FF2D78);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 6px 20px rgba(255, 45, 120, 0.3);
      transition: transform 0.2s;
    }
    .app-link:active { transform: scale(0.97); }
    .footer { margin-top: 40px; font-size: 13px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <h1>info-gate</h1>
    <a href="/nailshop/" class="app-link">Nailva — Nail Salon CRM</a>
    <p class="footer">&copy; 2026 info-gate</p>
  </div>
</body>
</html>
